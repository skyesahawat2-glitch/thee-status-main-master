<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thee Status - White Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBB3ChJXNd9HOxY5aag2lF8Cd97gYXsg00",
            authDomain: "thee-status.firebaseapp.com",
            projectId: "thee-status",
            storageBucket: "thee-status.firebasestorage.app",
            messagingSenderId: "225486231711",
            appId: "1:225486231711:web:672f1618bd30966fcfeaaa"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "thee-status-v5"; 

        window.fb = { auth, db, appId, doc, setDoc, onSnapshot, signInAnonymously, onAuthStateChanged };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow: hidden;
            background: #f8fafc;
            color: #1e293b;
            transition: background 1.5s ease;
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.05);
        }

        .status-glow-online { box-shadow: 0 0 100px -20px rgba(16, 185, 129, 0.15); }
        .status-glow-busy { box-shadow: 0 0 100px -20px rgba(244, 63, 94, 0.1); }
        .status-glow-deep { box-shadow: 0 0 100px -20px rgba(99, 102, 241, 0.15); }

        .orbit-ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(0, 0, 0, 0.03);
            animation: rotate 40s linear infinite;
        }

        @keyframes rotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .floating-avatar {
            animation: floating 8s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        .ambient-glow {
            position: absolute;
            width: 60vw;
            height: 60vw;
            border-radius: 50%;
            filter: blur(140px);
            opacity: 0.4;
            z-index: -1;
            transition: all 2s ease;
        }

        .btn-hover-effect {
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .btn-hover-effect:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }

        .text-gradient {
            background: linear-gradient(to bottom, #1e293b 40%, #64748b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const ADMIN_PASSWORD = "TCOM"; 

        const Icon = ({ name, size = 16, className = "" }) => {
            const iconsMap = {
                User: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
                Settings: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
                Zap: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
                Moon: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>,
                Coffee: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" x2="6" y1="2" y2="4"/><line x1="10" x2="10" y1="2" y2="4"/><line x1="14" x2="14" y1="2" y2="4"/></svg>,
                Logout: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            };
            return <span className={className}>{iconsMap[name] || null}</span>;
        };

        const BackgroundVisuals = ({ mode }) => {
            const glowColor = mode === 'deep_focus' ? '#818cf8' : (mode === 'busy' ? '#fb7185' : '#34d399');
            return (
                <div className="fixed inset-0 pointer-events-none overflow-hidden flex items-center justify-center">
                    <div className="ambient-glow" style={{ background: glowColor, top: '-20%', right: '-15%' }}></div>
                    <div className="ambient-glow" style={{ background: glowColor, bottom: '-20%', left: '-15%' }}></div>
                    
                    <div className="orbit-ring w-[600px] h-[600px] top-1/2 left-1/2"></div>
                    <div className="orbit-ring w-[900px] h-[900px] top-1/2 left-1/2" style={{ animationDirection: 'reverse', animationDuration: '60s' }}></div>
                </div>
            );
        };

        function App() {
            const [status, setStatus] = useState({ isAvailable: true, statusType: 'online', customNote: '', lastUpdated: '' });
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [showLogin, setShowLogin] = useState(false);
            const [loading, setLoading] = useState(true);
            const [inputPassword, setInputPassword] = useState("");
            const [tempNote, setTempNote] = useState("");
            
            const lineUrl = "https://line.me/ti/p/MUSZOXV8Zo";

            useEffect(() => {
                const init = async () => {
                    let attempts = 0;
                    while (!window.fb && attempts < 50) { await new Promise(r => setTimeout(r, 50)); attempts++; }
                    if (!window.fb) return;
                    const { auth, signInAnonymously, onAuthStateChanged, onSnapshot, db, appId, doc } = window.fb;
                    onAuthStateChanged(auth, (u) => { if (!u) signInAnonymously(auth); });
                    onSnapshot(doc(db, 'status_data', appId), (snap) => {
                        if (snap.exists()) {
                            const data = snap.data();
                            setStatus(data);
                            setTempNote(data.customNote || "");
                        }
                        setLoading(false);
                    });
                };
                init();
            }, []);

            const updateCloud = async (data) => {
                if (!window.fb) return;
                const { db, appId, doc, setDoc } = window.fb;
                await setDoc(doc(db, 'status_data', appId), {
                    ...data,
                    lastUpdated: new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' })
                }, { merge: true });
            };

            const handleLogin = () => {
                if (inputPassword.toUpperCase() === ADMIN_PASSWORD) {
                    setIsLoggedIn(true);
                    setInputPassword("");
                } else {
                    alert("Incorrect Access Key");
                }
            };

            if (loading) return (
                <div className="min-h-screen flex items-center justify-center bg-white">
                    <div className="w-8 h-8 border-2 border-slate-100 border-t-slate-800 rounded-full animate-spin"></div>
                </div>
            );

            const isDeep = status.statusType === 'deep_focus';
            const isBusy = status.statusType === 'busy' || status.statusType === 'work';
            const glowClass = isDeep ? 'status-glow-deep' : (isBusy ? 'status-glow-busy' : 'status-glow-online');

            return (
                <div className={`min-h-screen flex items-center justify-center p-6 transition-all duration-1000 bg-slate-50`}>
                    <BackgroundVisuals mode={status.statusType} />

                    <div className={`w-full max-w-[420px] glass-container rounded-[4rem] p-12 relative z-10 transition-all duration-1000 ${glowClass}`}>
                        
                        {/* Status Header */}
                        <div className="flex justify-between items-center mb-12">
                            <div className="flex items-center gap-2.5">
                                <div className={`w-2 h-2 rounded-full ${status.isAvailable ? 'bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.4)]' : 'bg-rose-500 shadow-[0_0_10px_rgba(244,63,94,0.4)]'}`}></div>
                                <span className="text-[10px] font-bold tracking-[0.4em] text-slate-400 uppercase">System Status</span>
                            </div>
                            {!isLoggedIn && (
                                <button onClick={() => setShowLogin(true)} className="p-2 text-slate-300 hover:text-slate-800 transition-colors">
                                    <Icon name="Settings" size={18} />
                                </button>
                            )}
                        </div>

                        {/* Profile Section */}
                        <div className="flex flex-col items-center mb-12">
                            <div className="relative group">
                                <div className={`w-32 h-32 rounded-full flex items-center justify-center bg-white border-2 border-slate-50 shadow-xl floating-avatar transition-all duration-1000 ${isDeep ? 'scale-110' : 'scale-100'}`}>
                                    <Icon 
                                        name={isDeep ? "Moon" : (status.statusType === 'work' ? "Zap" : (status.isAvailable ? "User" : "Coffee"))} 
                                        size={48} 
                                        className={`transition-all duration-700 ${isDeep ? 'text-indigo-500' : (status.isAvailable ? 'text-slate-800' : 'text-rose-500')}`} 
                                    />
                                </div>
                                <div className="absolute -bottom-2 left-1/2 -translate-x-1/2 px-8 py-2 rounded-full text-[12px] font-extrabold tracking-[0.4em] bg-white border border-slate-100 shadow-sm text-slate-900 whitespace-nowrap">
                                    THEE
                                </div>
                            </div>
                        </div>

                        {/* Display Information */}
                        <div className="text-center mb-12">
                            <h1 className="text-5xl font-black tracking-tighter text-gradient mb-4">
                                {isDeep ? 'DEEP FOCUS' : (status.statusType === 'work' ? 'WORKING' : (status.isAvailable ? 'ONLINE' : 'RESTING'))}
                            </h1>
                            <div className="min-h-[1.5rem]">
                                <p className="text-sm font-medium text-slate-400 italic px-4 leading-relaxed">
                                    {status.customNote ? `"${status.customNote}"` : "Ready to connect."}
                                </p>
                            </div>
                        </div>

                        {/* Actions Panel */}
                        {isLoggedIn ? (
                            <div className="space-y-6 pt-8 border-t border-slate-100 animate-in">
                                <div className="space-y-3">
                                    <label className="text-[9px] font-bold text-slate-300 uppercase tracking-widest px-1">Update Note</label>
                                    <div className="flex gap-2">
                                        <input 
                                            type="text" 
                                            value={tempNote} 
                                            onChange={(e) => setTempNote(e.target.value)}
                                            className="flex-1 bg-slate-50 border border-slate-100 rounded-2xl px-5 py-4 text-xs outline-none focus:border-slate-300 transition-all"
                                            placeholder="Current update..."
                                        />
                                        <button onClick={() => updateCloud({ customNote: tempNote })} className="bg-slate-900 text-white px-5 rounded-2xl text-[10px] font-bold btn-hover-effect">SET</button>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <button onClick={() => updateCloud({ isAvailable: true, statusType: 'online', customNote: '' })} className="py-4 rounded-2xl bg-emerald-50 text-emerald-600 border border-emerald-100 text-[10px] font-bold tracking-[0.2em] btn-hover-effect">ONLINE</button>
                                    <button onClick={() => updateCloud({ isAvailable: false, statusType: 'work' })} className="py-4 rounded-2xl bg-slate-50 text-slate-400 border border-slate-100 text-[10px] font-bold tracking-[0.2em] btn-hover-effect">BUSY</button>
                                    <button onClick={() => updateCloud({ isAvailable: false, statusType: 'deep_focus' })} className="col-span-2 py-4 rounded-2xl bg-indigo-600 text-white text-[10px] font-bold tracking-[0.3em] btn-hover-effect">DEEP FOCUS MODE</button>
                                </div>
                                <button onClick={() => setIsLoggedIn(false)} className="w-full flex items-center justify-center gap-2 py-2 text-[9px] text-slate-300 font-bold uppercase tracking-[0.4em] hover:text-slate-800 transition-all">
                                    <Icon name="Logout" size={12} /> Lock Dashboard
                                </button>
                            </div>
                        ) : showLogin ? (
                            <div className="pt-8 border-t border-slate-100 space-y-4 animate-in">
                                <input 
                                    type="password" 
                                    value={inputPassword}
                                    onChange={(e) => setInputPassword(e.target.value)}
                                    className="w-full bg-slate-50 border border-slate-100 px-8 py-5 rounded-[2rem] text-center text-sm outline-none focus:border-slate-300 transition-all"
                                    placeholder="Enter Key"
                                    onKeyDown={(e) => e.key === 'Enter' && handleLogin()}
                                />
                                <div className="flex gap-3">
                                    <button onClick={() => setShowLogin(false)} className="flex-1 py-4 bg-slate-100 rounded-[1.5rem] text-[10px] font-bold uppercase tracking-widest text-slate-500">Back</button>
                                    <button onClick={handleLogin} className="flex-[2] py-4 bg-slate-900 text-white rounded-[1.5rem] text-[10px] font-bold uppercase tracking-widest btn-hover-effect">Login</button>
                                </div>
                            </div>
                        ) : (
                            <div className="pt-8 border-t border-slate-100 flex flex-col items-center gap-8">
                                {status.isAvailable && (
                                    <a href={lineUrl} target="_blank" className="w-full py-6 bg-slate-900 text-white rounded-[2.5rem] text-[12px] font-bold tracking-[0.3em] flex items-center justify-center gap-3 shadow-xl hover:scale-[1.02] active:scale-[0.98] transition-all duration-500">
                                        <Icon name="Zap" size={16} /> CONTACT LINE
                                    </a>
                                )}
                                <div className="text-center opacity-60">
                                    <p className="text-[9px] font-bold text-slate-400 uppercase tracking-[0.6em] mb-1">Updated {status.lastUpdated || '--:--'}</p>
                                    <div className="w-8 h-[1px] bg-slate-200 mx-auto"></div>
                                </div>
                            </div>
                        )}
                    </div>
                    
                    <div className="fixed bottom-10 text-[9px] font-bold text-slate-300 uppercase tracking-[1.2em] select-none">
                        VERSION 5.2.0 (WHITE)
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
