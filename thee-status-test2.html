<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thee Status - Standalone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyBB3ChJXNd9HOxY5aag2lF8Cd97gYXsg00",
            authDomain: "thee-status.firebaseapp.com",
            projectId: "thee-status",
            storageBucket: "thee-status.firebasestorage.app",
            messagingSenderId: "225486231711",
            appId: "1:225486231711:web:672f1618bd30966fcfeaaa",
            measurementId: "G-RTC07VQ5RH"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "thee-status-v5"; 

        window.fb = { auth, db, appId, doc, setDoc, onSnapshot, signInAnonymously, onAuthStateChanged };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #FDFDFD; overflow-x: hidden; }
        .animate-in { animation: fade-in 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .admin-scroll::-webkit-scrollbar { width: 4px; }
        .admin-scroll::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- แก้ไขรหัสผ่านใหม่เป็น Tcom เรียบร้อยแล้ว ---
        const ADMIN_PASSWORD = "Tcom"; 

        const Icon = ({ name, size = 16, className = "" }) => {
            const iconsMap = {
                User: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
                Settings: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
                Timer: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="10" x2="14" y1="2" y2="2"/><line x1="12" x2="12" y1="14" y2="11"/><circle cx="12" cy="14" r="8"/></svg>,
                MessageCircle: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>,
                Clock: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
                Briefcase: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>,
                Target: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
            };
            return <span className={className}>{iconsMap[name] || null}</span>;
        };

        function App() {
            const [isAvailable, setIsAvailable] = useState(true);
            const [statusType, setStatusType] = useState("online"); // online, work, deep_focus, busy
            const [lastUpdated, setLastUpdated] = useState("");
            const [customNote, setCustomNote] = useState("");
            const [tempNote, setTempNote] = useState("");
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [showLogin, setShowLogin] = useState(false);
            const [timeLeft, setTimeLeft] = useState(null);
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [selectedMinutes, setSelectedMinutes] = useState(30);
            const [errorMsg, setErrorMsg] = useState("");
            const [inputPassword, setInputPassword] = useState("");

            const lineUrl = "https://line.me/ti/p/MUSZOXV8Zo";

            const getStatusDoc = () => {
                if (!window.fb) return null;
                const { db, appId, doc } = window.fb;
                return doc(db, 'status_data', appId);
            };

            const updateCloud = async (data) => {
                if (!user || !window.fb) return;
                const { setDoc } = window.fb;
                
                // ถ้ายกเลิก isAvailable และไม่ได้ส่ง statusType มา ให้ตั้งเป็น busy เริ่มต้น
                const newStatusType = data.statusType || (data.isAvailable ? 'online' : (statusType === 'online' ? 'busy' : statusType));

                try {
                    await setDoc(getStatusDoc(), {
                        ...data,
                        statusType: newStatusType,
                        lastUpdated: new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' })
                    }, { merge: true });
                } catch (e) { 
                    console.error("Save Error:", e);
                    alert("บันทึกไม่สำเร็จ!"); 
                }
            };

            const handleSetBusyWithTimer = (minutes) => {
                const expiry = Date.now() + (minutes * 60 * 1000);
                updateCloud({ isAvailable: false, statusType: 'busy', expiry: expiry, customNote: "ติดธุระ" });
            };

            const handleLogin = () => {
                if (inputPassword.toLowerCase() === ADMIN_PASSWORD.toLowerCase()) {
                    setIsLoggedIn(true);
                    setShowLogin(false);
                    setInputPassword("");
                } else {
                    alert("รหัสผ่านไม่ถูกต้อง");
                }
            };

            useEffect(() => {
                const init = async () => {
                    let attempts = 0;
                    // ปรับการตรวจสอบให้เช็คถี่ขึ้นเพื่อลดเวลาในการโหลด (ทุก 50ms)
                    while (!window.fb && attempts < 100) {
                        await new Promise(r => setTimeout(r, 50));
                        attempts++;
                    }
                    if (!window.fb) {
                        setErrorMsg("ไม่สามารถโหลด Firebase SDK ได้");
                        return;
                    }

                    const { auth, signInAnonymously, onAuthStateChanged } = window.fb;
                    const unsubscribe = onAuthStateChanged(auth, (u) => {
                        setUser(u);
                        if (!u) {
                            signInAnonymously(auth).catch((e) => {
                                if (e.code === 'auth/configuration-not-found') {
                                    setErrorMsg("กรุณาเปิดใช้งาน 'Anonymous Sign-in' ใน Firebase Console");
                                }
                            });
                        }
                    });
                    return () => unsubscribe();
                };
                init();
            }, []);

            useEffect(() => {
                if (!user || !window.fb) return;
                const { onSnapshot } = window.fb;
                const unsubscribe = onSnapshot(getStatusDoc(), (snap) => {
                    if (snap.exists()) {
                        const d = snap.data();
                        setIsAvailable(d.isAvailable ?? true);
                        setStatusType(d.statusType || (d.isAvailable ? 'online' : 'busy'));
                        setCustomNote(d.customNote || "");
                        setLastUpdated(d.lastUpdated || "");
                        if (d.expiry) {
                            const remain = Math.max(0, Math.floor((d.expiry - Date.now()) / 1000));
                            setTimeLeft(remain > 0 ? remain : null);
                        } else setTimeLeft(null);
                    }
                    setLoading(false);
                }, (err) => {
                    console.error("Database Error:", err);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, [user]);

            useEffect(() => {
                if (timeLeft === null || timeLeft <= 0) return;
                const t = setInterval(() => setTimeLeft(p => p - 1), 1000);
                return () => clearInterval(t);
            }, [timeLeft]);

            if (errorMsg) return (
                <div className="min-h-screen flex flex-col items-center justify-center p-8 text-center bg-rose-50 relative">
                    <div className="max-w-md p-8 bg-white rounded-3xl shadow-lg border border-rose-100 animate-in">
                        <div className="text-slate-800 font-bold mb-4 text-xl">การตั้งค่าไม่สมบูรณ์</div>
                        <p className="text-sm text-slate-500 mb-8">{errorMsg}</p>
                        <button onClick={() => window.location.reload()} className="w-full py-4 bg-slate-900 text-white rounded-2xl text-[10px] font-bold uppercase tracking-widest">ลองใหม่อีกครั้ง</button>
                    </div>
                    <div className="absolute bottom-8 text-[9px] font-bold text-slate-300 uppercase tracking-[0.5em]">TheeTechnology</div>
                </div>
            );

            if (loading) return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 relative">
                    <div className="flex flex-col items-center gap-4">
                        <div className="w-10 h-10 border-4 border-slate-200 border-t-slate-800 rounded-full animate-spin"></div>
                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center leading-relaxed">กำลังเชื่อมต่อ<br/>Tstatus Server By firebase</p>
                    </div>
                    <div className="absolute bottom-8 text-[9px] font-bold text-slate-300 uppercase tracking-[0.5em]">TheeTechnology</div>
                </div>
            );

            // คำนวณการตกแต่ง UI ตามสถานะปัจจุบัน (Deep Focus / Work / Normal)
            const isDeepFocus = statusType === 'deep_focus';
            const isWork = statusType === 'work';

            const bgAppClass = isDeepFocus ? 'bg-slate-950' : 'bg-slate-50';
            const cardClass = isDeepFocus 
                ? 'bg-slate-900 shadow-indigo-900/20 border-slate-800' 
                : 'bg-white shadow-slate-200/50 border-white';
            const textMainClass = isDeepFocus ? 'text-slate-100' : 'text-slate-800';
            const adminIconClass = isDeepFocus ? 'text-slate-600 hover:text-slate-400' : 'text-slate-200 hover:text-slate-400';

            let ringClass = 'ring-emerald-100 bg-emerald-50 text-emerald-400';
            let statusDisplay = 'AVAILABLE';
            
            if (!isAvailable) {
                if (isDeepFocus) {
                    ringClass = 'ring-indigo-900/50 bg-indigo-950/50 text-indigo-400';
                    statusDisplay = 'DEEP FOCUS';
                } else if (isWork) {
                    ringClass = 'ring-blue-100 bg-blue-50 text-blue-500';
                    statusDisplay = 'WORKING';
                } else {
                    ringClass = 'ring-rose-100 bg-rose-50 text-rose-400';
                    statusDisplay = 'BUSY NOW';
                }
            }

            return (
                <div className={`min-h-screen flex flex-col items-center justify-center p-6 transition-colors duration-700 ${bgAppClass} relative`}>
                    <div className={`w-full max-w-md rounded-[3rem] shadow-2xl p-12 relative overflow-hidden animate-in transition-colors duration-700 border ${cardClass}`}>
                        
                        {!isLoggedIn && (
                            <button onClick={() => setShowLogin(true)} className={`absolute top-10 right-10 transition-colors z-20 ${adminIconClass}`}>
                                <Icon name="Settings" size={20} />
                            </button>
                        )}

                        <div className="flex flex-col items-center mb-10">
                            <div className={`w-24 h-24 rounded-full flex items-center justify-center ring-offset-8 ring-2 transition-all duration-700 ${isDeepFocus ? '!ring-offset-slate-900' : ''} ${ringClass}`}>
                                <Icon name={isDeepFocus ? "Target" : (isWork ? "Briefcase" : "User")} size={44} />
                            </div>
                            <h1 className={`mt-8 text-2xl font-bold tracking-tight transition-colors duration-700 ${textMainClass}`}>THEE</h1>
                        </div>

                        <div className="text-center space-y-3 mb-10">
                            <h2 className={`text-3xl font-light tracking-tight transition-colors duration-700 ${isAvailable ? (isDeepFocus ? 'text-slate-200' : 'text-slate-800') : (isDeepFocus ? 'text-indigo-400 font-medium' : 'text-slate-400')}`}>
                                {statusDisplay}
                            </h2>
                            {customNote && <p className={`text-sm italic font-medium transition-colors duration-700 ${isDeepFocus ? 'text-indigo-300/80' : 'text-slate-400'}`}>"{customNote}"</p>}
                            
                            {timeLeft !== null && (
                                <div className={`inline-flex items-center gap-2 px-6 py-2.5 rounded-full text-[10px] font-bold mt-4 animate-pulse transition-colors duration-700 ${isDeepFocus ? 'bg-indigo-900/30 text-indigo-400 border border-indigo-800/50' : 'bg-rose-50 text-rose-500 border border-rose-100'}`}>
                                    <Icon name="Timer" size={12} /> จะว่างในอีก {Math.floor(timeLeft/60)}:{(timeLeft%60).toString().padStart(2, '0')}
                                </div>
                            )}
                        </div>

                        {isLoggedIn ? (
                            <div className={`space-y-6 pt-6 border-t max-h-[60vh] overflow-y-auto pr-2 admin-scroll transition-colors duration-700 ${isDeepFocus ? 'border-slate-800' : 'border-slate-50'}`}>
                                
                                {/* Quick Status Presets */}
                                <div className="space-y-3">
                                    <label className={`text-[10px] font-bold uppercase tracking-widest ${isDeepFocus ? 'text-slate-500' : 'text-slate-300'}`}>Quick Status</label>
                                    <div className="grid grid-cols-2 gap-3">
                                        <button onClick={() => updateCloud({ isAvailable: true, statusType: 'online', expiry: null, customNote: "" })} className={`py-4 rounded-2xl text-[10px] font-bold transition-all ${isAvailable ? 'bg-emerald-500 text-white shadow-lg shadow-emerald-100' : (isDeepFocus ? 'bg-slate-800 text-slate-400 hover:bg-slate-700' : 'bg-slate-50 text-slate-400 hover:bg-slate-100')}`}>ONLINE</button>
                                        
                                        <button onClick={() => updateCloud({ isAvailable: false, statusType: 'work', expiry: null, customNote: "อยู่ในเวลางาน" })} className={`py-4 rounded-2xl text-[10px] font-bold transition-all ${isWork ? 'bg-blue-500 text-white shadow-lg shadow-blue-100' : (isDeepFocus ? 'bg-slate-800 text-slate-400 hover:bg-slate-700' : 'bg-slate-50 text-slate-400 hover:bg-slate-100')}`}>เวลางาน</button>
                                        
                                        <button onClick={() => updateCloud({ isAvailable: false, statusType: 'deep_focus', expiry: null, customNote: "Deep Focus - ห้ามรบกวน" })} className={`col-span-2 py-4 rounded-2xl text-[10px] font-bold transition-all ${isDeepFocus ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-900/50' : 'bg-slate-900 text-white shadow-lg shadow-slate-200 hover:bg-black'}`}>DEEP FOCUS</button>
                                    </div>
                                </div>

                                <div className={`p-5 rounded-[2rem] space-y-4 border transition-colors duration-700 ${isDeepFocus ? 'bg-slate-800/50 border-slate-700/50' : 'bg-slate-50 border-slate-100'}`}>
                                    <div className="flex justify-between items-center px-1">
                                        <span className={`text-[10px] font-bold uppercase tracking-widest ${isDeepFocus ? 'text-slate-400' : 'text-slate-400'}`}>Timer (Busy)</span>
                                        <div className="flex gap-1.5">
                                            {[15, 30, 60].map(m => (
                                                <button key={m} onClick={() => setSelectedMinutes(m)} className={`w-9 h-9 rounded-xl text-[10px] font-bold border transition-all ${selectedMinutes === m ? (isDeepFocus ? 'bg-indigo-500 text-white border-indigo-500' : 'bg-slate-800 text-white border-slate-800') : (isDeepFocus ? 'bg-slate-800 text-slate-400 border-slate-700' : 'bg-white text-slate-400 border-slate-200')}`}>{m}</button>
                                            ))}
                                        </div>
                                    </div>
                                    <button onClick={() => handleSetBusyWithTimer(selectedMinutes)} className={`w-full py-4 border rounded-2xl text-[10px] font-bold shadow-sm uppercase tracking-widest transition-all active:scale-95 ${isDeepFocus ? 'bg-slate-800 border-slate-700 text-slate-300 hover:bg-slate-700' : 'bg-white border-slate-200 text-slate-700 hover:shadow-md'}`}>Start {selectedMinutes} Min Timer</button>
                                </div>

                                <div className="flex flex-col gap-2">
                                    <div className="flex gap-2">
                                        <input type="text" value={tempNote} onChange={e => setTempNote(e.target.value)} className={`flex-1 px-5 py-4 rounded-2xl text-xs outline-none transition-colors ${isDeepFocus ? 'bg-slate-800 text-white placeholder-slate-500 focus:ring-2 ring-indigo-500/50' : 'bg-slate-50 text-slate-800 focus:ring-2 ring-slate-100'}`} placeholder="ระบุสถานะเพิ่มเติม..." />
                                        <button onClick={() => { updateCloud({ customNote: tempNote }); setTempNote(""); }} className={`px-6 text-white rounded-2xl text-[10px] font-bold uppercase transition-all ${isDeepFocus ? 'bg-indigo-600 hover:bg-indigo-500' : 'bg-slate-900 hover:bg-black'}`}>SET</button>
                                    </div>
                                </div>
                                <button onClick={() => setIsLoggedIn(false)} className={`w-full py-4 text-[9px] font-bold uppercase tracking-[0.4em] transition-colors ${isDeepFocus ? 'text-slate-600 hover:text-slate-400' : 'text-slate-300 hover:text-slate-500'}`}>Lock Admin Panel</button>
                            </div>
                        ) : showLogin ? (
                            <div className={`pt-8 border-t space-y-4 transition-colors duration-700 ${isDeepFocus ? 'border-slate-800' : 'border-slate-50'}`}>
                                <input 
                                    type="password" 
                                    value={inputPassword}
                                    onChange={(e) => setInputPassword(e.target.value)}
                                    className={`w-full px-6 py-5 rounded-2xl text-sm text-center outline-none transition-all ${isDeepFocus ? 'bg-slate-800 text-white placeholder-slate-500' : 'bg-slate-50 border border-transparent focus:border-slate-200'}`} 
                                    placeholder="ใส่รหัสผ่านแอดมิน" 
                                    onKeyDown={(e) => e.key === 'Enter' && handleLogin()}
                                />
                                <button onClick={handleLogin} className={`w-full py-5 text-white rounded-2xl text-[10px] font-bold tracking-[0.3em] shadow-xl active:scale-95 transition-all uppercase ${isDeepFocus ? 'bg-indigo-600 shadow-indigo-900/50' : 'bg-slate-900 shadow-slate-100'}`}>เข้าสู่ระบบ</button>
                                <button onClick={() => setShowLogin(false)} className={`w-full text-[9px] font-bold uppercase tracking-widest ${isDeepFocus ? 'text-slate-500 hover:text-slate-300' : 'text-slate-300 hover:text-slate-400'}`}>ยกเลิก</button>
                            </div>
                        ) : (
                            <div className={`flex flex-col items-center gap-6 pt-8 border-t transition-colors duration-700 ${isDeepFocus ? 'border-slate-800' : 'border-slate-50'}`}>
                                {isAvailable && !isDeepFocus && (
                                    <a href={lineUrl} target="_blank" rel="noopener noreferrer" className="w-full py-5 bg-slate-900 text-white rounded-2xl text-[10px] font-bold tracking-[0.2em] flex items-center justify-center gap-3 hover:bg-black transition-all shadow-xl uppercase active:scale-[0.98]">
                                        <Icon name="MessageCircle" size={14} /> Contact Me (LINE)
                                    </a>
                                )}
                                <div className="flex flex-col items-center gap-1">
                                    <p className={`text-[9px] font-bold uppercase tracking-[0.5em] transition-colors duration-700 ${isDeepFocus ? 'text-slate-600' : 'text-slate-300'}`}>Synced At: {lastUpdated || 'Never'}</p>
                                </div>
                            </div>
                        )}
                    </div>
                    
                    {/* Watermark */}
                    <div className={`absolute bottom-8 text-[9px] font-bold uppercase tracking-[0.5em] transition-colors duration-700 ${isDeepFocus ? 'text-slate-800' : 'text-slate-300'}`}>
                        TheeTechnology
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
