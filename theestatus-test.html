<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thee Status - Standalone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- ข้อมูลจาก Firebase Console ของคุณ ---
        const firebaseConfig = {
            apiKey: "AIzaSyBB3ChJXNd9HOxY5aag2lF8Cd97gYXsg00",
            authDomain: "thee-status.firebaseapp.com",
            projectId: "thee-status",
            storageBucket: "thee-status.firebasestorage.app",
            messagingSenderId: "225486231711",
            appId: "1:225486231711:web:672f1618bd30966fcfeaaa",
            measurementId: "G-RTC07VQ5RH"
        };

        // เริ่มต้น Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "thee-status-v5"; 

        // ส่งออกไปยัง window เพื่อให้ React เข้าถึงได้
        window.fb = { auth, db, appId, doc, setDoc, onSnapshot, signInAnonymously, onAuthStateChanged };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #FDFDFD; overflow-x: hidden; }
        .animate-in { animation: fade-in 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .admin-scroll::-webkit-scrollbar { width: 4px; }
        .admin-scroll::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 16, className = "" }) => {
            const iconsMap = {
                User: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
                Settings: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
                Timer: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="10" x2="14" y1="2" y2="2"/><line x1="12" x2="12" y1="14" y2="11"/><circle cx="12" cy="14" r="8"/></svg>,
                MessageCircle: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>,
                Clock: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            };
            return <span className={className}>{iconsMap[name] || null}</span>;
        };

        function App() {
            const [isAvailable, setIsAvailable] = useState(true);
            const [lastUpdated, setLastUpdated] = useState("");
            const [customNote, setCustomNote] = useState("");
            const [tempNote, setTempNote] = useState("");
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [showLogin, setShowLogin] = useState(false);
            const [timeLeft, setTimeLeft] = useState(null);
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [selectedMinutes, setSelectedMinutes] = useState(30);
            const [errorMsg, setErrorMsg] = useState("");

            const lineUrl = "https://line.me/ti/p/MUSZOXV8Zo";

            const getStatusDoc = () => {
                if (!window.fb) return null;
                const { db, appId, doc } = window.fb;
                return doc(db, 'status_data', appId);
            };

            const updateCloud = async (data) => {
                if (!user || !window.fb) return;
                const { setDoc } = window.fb;
                try {
                    await setDoc(getStatusDoc(), {
                        ...data,
                        lastUpdated: new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' })
                    }, { merge: true });
                } catch (e) { 
                    console.error("Save Error:", e);
                    alert("บันทึกไม่สำเร็จ! กรุณาตรวจสอบ Firebase Rules ของคุณ (ต้องเปิดเป็น allow read, write: if true;)"); 
                }
            };

            const handleSetBusyWithTimer = (minutes) => {
                const expiry = Date.now() + (minutes * 60 * 1000);
                updateCloud({ isAvailable: false, expiry: expiry });
            };

            // ส่วนการจัดการ Authentication
            useEffect(() => {
                const init = async () => {
                    let attempts = 0;
                    // รอจนกว่า Firebase SDK จะโหลดเสร็จใน window.fb
                    while (!window.fb && attempts < 30) {
                        await new Promise(r => setTimeout(r, 200));
                        attempts++;
                    }
                    if (!window.fb) {
                        setErrorMsg("ไม่สามารถโหลด Firebase SDK ได้ กรุณารีเฟรชหน้าจอ");
                        return;
                    }

                    const { auth, signInAnonymously, onAuthStateChanged } = window.fb;
                    
                    // ตั้งค่า Auth listener
                    const unsubscribe = onAuthStateChanged(auth, (u) => {
                        setUser(u);
                        if (!u) {
                            // ถ้าไม่มี User ให้พยายาม Login แบบ Anonymous
                            signInAnonymously(auth).catch((e) => {
                                console.error("Auth Error:", e);
                                if (e.code === 'auth/configuration-not-found') {
                                    setErrorMsg("กรุณาเปิดใช้งาน 'Anonymous Sign-in' ใน Firebase Console ของคุณก่อน");
                                } else {
                                    setErrorMsg("ข้อผิดพลาดในการเชื่อมต่อ: " + e.message);
                                }
                            });
                        }
                    });

                    return () => unsubscribe();
                };
                init();
            }, []);

            // ส่วนการเชื่อมต่อฐานข้อมูลแบบ Real-time
            useEffect(() => {
                if (!user || !window.fb) return;
                const { onSnapshot } = window.fb;
                const unsubscribe = onSnapshot(getStatusDoc(), (snap) => {
                    if (snap.exists()) {
                        const d = snap.data();
                        setIsAvailable(d.isAvailable ?? true);
                        setCustomNote(d.customNote || "");
                        setLastUpdated(d.lastUpdated || "");
                        if (d.expiry) {
                            const remain = Math.max(0, Math.floor((d.expiry - Date.now()) / 1000));
                            setTimeLeft(remain > 0 ? remain : null);
                        } else setTimeLeft(null);
                    }
                    setLoading(false);
                }, (err) => {
                    console.error("Database Error:", err);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, [user]);

            // ตัวนับเวลาถอยหลัง
            useEffect(() => {
                if (timeLeft === null || timeLeft <= 0) return;
                const t = setInterval(() => setTimeLeft(p => p - 1), 1000);
                return () => clearInterval(t);
            }, [timeLeft]);

            // หน้าจอแจ้งข้อผิดพลาด
            if (errorMsg) return (
                <div className="min-h-screen flex items-center justify-center p-8 text-center bg-rose-50">
                    <div className="max-w-md p-8 bg-white rounded-3xl shadow-lg border border-rose-100 animate-in">
                        <div className="w-16 h-16 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-6">
                            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                        </div>
                        <div className="text-slate-800 font-bold mb-4 text-xl">การตั้งค่าไม่สมบูรณ์</div>
                        <p className="text-sm text-slate-500 mb-8 leading-relaxed">{errorMsg}</p>
                        <button onClick={() => window.location.reload()} className="w-full py-4 bg-slate-900 text-white rounded-2xl text-[10px] font-bold uppercase tracking-widest hover:bg-black transition-all">ลองใหม่อีกครั้ง</button>
                    </div>
                </div>
            );

            // หน้าจอโหลดข้อมูล
            if (loading) return (
                <div className="min-h-screen flex items-center justify-center bg-slate-50">
                    <div className="flex flex-col items-center gap-3">
                        <div className="w-8 h-8 border-4 border-slate-200 border-t-slate-800 rounded-full animate-spin"></div>
                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">กำลังซิงค์ข้อมูล...</p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-slate-50">
                    <div className="w-full max-w-md bg-white rounded-[3rem] shadow-2xl shadow-slate-200/50 p-12 relative overflow-hidden animate-in">
                        {!isLoggedIn && (
                            <button onClick={() => setShowLogin(true)} className="absolute top-10 right-10 text-slate-200 hover:text-slate-400 transition-colors">
                                <Icon name="Settings" size={20} />
                            </button>
                        )}

                        <div className="flex flex-col items-center mb-10">
                            <div className={`w-24 h-24 rounded-full flex items-center justify-center ring-offset-8 ring-2 transition-all duration-700 ${isAvailable ? 'ring-emerald-100 bg-emerald-50 text-emerald-400' : 'ring-rose-100 bg-rose-50 text-rose-400'}`}>
                                <Icon name="User" size={44} />
                            </div>
                            <h1 className="mt-8 text-2xl font-bold text-slate-800 tracking-tight">THEE</h1>
                        </div>

                        <div className="text-center space-y-3 mb-10">
                            <h2 className={`text-3xl font-light tracking-tight ${isAvailable ? 'text-slate-800' : 'text-slate-400'}`}>
                                {isAvailable ? 'AVAILABLE' : 'BUSY NOW'}
                            </h2>
                            {customNote && <p className="text-sm text-slate-400 italic font-medium">"{customNote}"</p>}
                            {timeLeft !== null && (
                                <div className="inline-flex items-center gap-2 px-6 py-2.5 bg-rose-50 text-rose-500 rounded-full text-[10px] font-bold mt-4 border border-rose-100 animate-pulse">
                                    <Icon name="Timer" size={12} /> จะว่างในอีก {Math.floor(timeLeft/60)}:{(timeLeft%60).toString().padStart(2, '0')}
                                </div>
                            )}
                        </div>

                        {isLoggedIn ? (
                            <div className="space-y-6 pt-6 border-t border-slate-50 max-h-[60vh] overflow-y-auto pr-2 admin-scroll">
                                <div className="grid grid-cols-2 gap-3">
                                    <button onClick={() => updateCloud({ isAvailable: true, expiry: null })} className={`py-4 rounded-2xl text-[10px] font-bold transition-all ${isAvailable ? 'bg-emerald-500 text-white shadow-lg shadow-emerald-100' : 'bg-slate-50 text-slate-400 hover:bg-slate-100'}`}>ONLINE</button>
                                    <button onClick={() => updateCloud({ isAvailable: false, expiry: null })} className={`py-4 rounded-2xl text-[10px] font-bold transition-all ${!isAvailable && timeLeft === null ? 'bg-rose-500 text-white shadow-lg shadow-rose-100' : 'bg-slate-50 text-slate-400 hover:bg-slate-100'}`}>BUSY (NO TIMER)</button>
                                </div>

                                <div className="p-5 bg-slate-50 rounded-[2rem] space-y-4 border border-slate-100">
                                    <div className="flex justify-between items-center px-1">
                                        <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Timer</span>
                                        <div className="flex gap-1.5">
                                            {[15, 30, 60].map(m => (
                                                <button key={m} onClick={() => setSelectedMinutes(m)} className={`w-9 h-9 rounded-xl text-[10px] font-bold border transition-all ${selectedMinutes === m ? 'bg-slate-800 text-white border-slate-800' : 'bg-white text-slate-400 border-slate-200 hover:border-slate-300'}`}>{m}</button>
                                            ))}
                                        </div>
                                    </div>
                                    <button onClick={() => handleSetBusyWithTimer(selectedMinutes)} className="w-full py-4 bg-white border border-slate-200 text-slate-700 rounded-2xl text-[10px] font-bold shadow-sm hover:shadow-md transition-all active:scale-95 uppercase tracking-widest">Start {selectedMinutes} Min Timer</button>
                                </div>

                                <div className="flex flex-col gap-2">
                                    <label className="text-[10px] font-bold text-slate-300 px-1 uppercase tracking-widest">Status Note</label>
                                    <div className="flex gap-2">
                                        <input type="text" value={tempNote} onChange={e => setTempNote(e.target.value)} className="flex-1 px-5 py-4 bg-slate-50 rounded-2xl text-xs outline-none focus:ring-2 ring-slate-100 transition-all" placeholder="สถานะปัจจุบัน..." />
                                        <button onClick={() => { updateCloud({ customNote: tempNote }); setTempNote(""); }} className="px-6 bg-slate-900 text-white rounded-2xl text-[10px] font-bold hover:bg-black transition-all">SET</button>
                                    </div>
                                </div>
                                <button onClick={() => setIsLoggedIn(false)} className="w-full py-4 text-[9px] font-bold text-slate-300 uppercase tracking-[0.4em] hover:text-slate-500 transition-colors">Lock Admin Panel</button>
                            </div>
                        ) : showLogin ? (
                            <div className="pt-8 border-t border-slate-50 space-y-4">
                                <input id="pw" type="password" className="w-full px-6 py-5 bg-slate-50 rounded-2xl text-sm text-center border border-transparent focus:border-slate-200 outline-none transition-all" placeholder="ใส่รหัสผ่านแอดมิน" />
                                <button onClick={() => { if(document.getElementById('pw').value === 'admin') setIsLoggedIn(true); setShowLogin(false); }} className="w-full py-5 bg-slate-900 text-white rounded-2xl text-[10px] font-bold tracking-[0.3em] shadow-xl shadow-slate-100 active:scale-95 transition-all uppercase">เข้าสู่ระบบ</button>
                                <button onClick={() => setShowLogin(false)} className="w-full text-[9px] font-bold text-slate-300 uppercase tracking-widest hover:text-slate-400">ยกเลิก</button>
                            </div>
                        ) : (
                            <div className="flex flex-col items-center gap-6 pt-8 border-t border-slate-50">
                                {isAvailable && (
                                    <a href={lineUrl} target="_blank" rel="noopener noreferrer" className="w-full py-5 bg-slate-900 text-white rounded-2xl text-[10px] font-bold tracking-[0.2em] flex items-center justify-center gap-3 hover:bg-black transition-all shadow-xl shadow-slate-200/50 uppercase active:scale-[0.98]">
                                        <Icon name="MessageCircle" size={14} /> Contact Me (LINE)
                                    </a>
                                )}
                                <div className="flex flex-col items-center gap-1">
                                    <p className="text-[9px] font-bold text-slate-300 uppercase tracking-[0.5em]">Synced At: {lastUpdated || 'Never'}</p>
                                    <p className="text-[8px] text-slate-200">ID: {user?.uid?.substring(0, 8)}...</p>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
